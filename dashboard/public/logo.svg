<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#1a1a2e" stroke="#7c3aed" stroke-width="2"/>

  <!-- Suit body -->
  <path d="M35 72 L45 55 L60 50 L75 55 L85 72 L82 95 L38 95 Z" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Suit lapels -->
  <path d="M50 55 L60 70 L55 95" fill="none" stroke="#475569" stroke-width="1.5"/>
  <path d="M70 55 L60 70 L65 95" fill="none" stroke="#475569" stroke-width="1.5"/>

  <!-- Tie -->
  <path d="M58 60 L60 58 L62 60 L61 78 L60 80 L59 78 Z" fill="#7c3aed"/>

  <!-- Shirt collar -->
  <path d="M52 55 L60 50 L68 55 L64 58 L60 54 L56 58 Z" fill="#e2e8f0"/>

  <!-- Head (lobster-shaped) -->
  <ellipse cx="60" cy="38" rx="18" ry="15" fill="#ef4444"/>

  <!-- Head highlight -->
  <ellipse cx="57" cy="34" rx="10" ry="8" fill="#f87171" opacity="0.4"/>

  <!-- Antennae -->
  <path d="M48 28 Q42 15 35 10" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M72 28 Q78 15 85 10" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Antenna tips -->
  <circle cx="35" cy="10" r="2.5" fill="#f87171"/>
  <circle cx="85" cy="10" r="2.5" fill="#f87171"/>

  <!-- Sunglasses -->
  <rect x="44" y="33" width="13" height="9" rx="2" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="63" y="33" width="13" height="9" rx="2" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <line x1="57" y1="37" x2="63" y2="37" stroke="#334155" stroke-width="1.5"/>
  <line x1="44" y1="37" x2="40" y2="35" stroke="#334155" stroke-width="1.5"/>
  <line x1="76" y1="37" x2="80" y2="35" stroke="#334155" stroke-width="1.5"/>

  <!-- Sunglasses shine -->
  <rect x="46" y="35" width="4" height="2" rx="0.5" fill="#7c3aed" opacity="0.5"/>
  <rect x="65" y="35" width="4" height="2" rx="0.5" fill="#7c3aed" opacity="0.5"/>

  <!-- Mouth (subtle smirk) -->
  <path d="M53 46 Q60 49 67 46" stroke="#b91c1c" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Claws (like arms coming from suit) -->
  <path d="M35 72 L25 65 L20 58" stroke="#ef4444" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M18 55 L20 58 L18 61" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M22 55 L20 58 L22 61" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <path d="M85 72 L95 65 L100 58" stroke="#ef4444" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M98 55 L100 58 L98 61" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M102 55 L100 58 L102 61" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
